<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Call - TC Chat</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    body.call {
      margin: 0;
      height: 100vh;
      background-color: #0d0d0d;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', sans-serif;
    }

    .call-wrap {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      background-color: #111;
    }

    /* Header */
    .call-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 20px;
      background-color: #1a1a1a;
      border-bottom: 1px solid #333;
    }
    .call-header .who {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .call-header .avatar img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
    }
    .call-header .name {
      font-weight: 600;
      font-size: 1rem;
    }
    .call-header .type {
      font-size: 0.85rem;
      color: #bbb;
    }

    .call-header .actions {
      display: flex;
      gap: 10px;
    }
    .call-header button {
      padding: 8px 14px;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      font-weight: 500;
      transition: background 0.2s ease;
    }
    #toggle-mic { background-color: #2d89ef; color: white; }
    #toggle-mic:hover { background-color: #1a5fba; }

    #toggle-cam { background-color: #6a5acd; color: white; }
    #toggle-cam:hover { background-color: #4b3c91; }

    #hangup { background-color: #e81123; color: white; }
    #hangup:hover { background-color: #a50d1c; }

    /* Video area */
    .videos {
      flex: 1;
      position: relative;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .videos video {
      max-width: 100%;
      max-height: 100%;
      border-radius: 8px;
      background: black;
    }

    /* Local video overlay */
    #localVideo {
      position: absolute;
      bottom: 10px;
      right: 10px;
      width: 150px;
      height: auto;
      border: 2px solid #444;
      border-radius: 8px;
      z-index: 2;
    }

    /* Audio-only UI */
    .videos.audio-only {
      flex-direction: column;
      gap: 20px;
    }
    .audio-visual {
      font-size: 1.2rem;
      font-weight: 500;
      color: #4caf50;
      margin-top: 20px;
    }
    #remoteVideo { display: block; }
    .videos.audio-only #remoteVideo,
    .videos.audio-only #localVideo {
      display: none;
    }
  </style>
</head>
<body class="call">
  <div class="call-wrap">
    <!-- Header -->
    <header class="call-header">
      <div class="who">
        <div class="avatar">
          <img src="{{ peer.avatar }}" alt="{{ peer.username }}">
        </div>
        <div>
          <div class="name">{{ peer.username }}</div>
          <div class="type">{{ call_type|capitalize }} call</div>
        </div>
      </div>
      <div class="actions">
        <button id="toggle-mic">🎙 Mic</button>
        {% if call_type == 'video' %}
          <button id="toggle-cam">📷 Cam</button>
        {% endif %}
        <button id="hangup" class="danger">❌ End</button>
      </div>
    </header>

    <!-- Videos / Audio UI -->
    <div class="videos {% if call_type == 'audio' %}audio-only{% endif %}">
      <video id="localVideo" autoplay playsinline muted></video>
      <video id="remoteVideo" autoplay playsinline></video>
      {% if call_type == 'audio' %}
        <div class="audio-visual">🔊 Connected</div>
      {% endif %}
    </div>
  </div>

  <!-- Call setup -->
  <script>
    window.CALL_PEER_ID = {{ peer.id }};
    window.CALL_TYPE = "{{ call_type }}";
    window.CURRENT_USER_ID = {{ current_user.id }};
  </script>
  <script src="/static/js/call.js"></script>
</body>
</html>
