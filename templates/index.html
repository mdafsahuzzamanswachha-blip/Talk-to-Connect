<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Talkto Connect</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/css/style.css" />
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body class="bg-gray-900 text-gray-100 font-[Inter] h-screen">
  <div class="h-full grid grid-cols-12">
    <!-- Sidebar -->
    <aside class="col-span-3 lg:col-span-2 border-r border-gray-800 p-4 overflow-y-auto">
      <div class="flex items-center justify-between mb-4">
        <h1 class="text-lg font-semibold">Talkto Connect</h1>
        <a href="/logout" class="text-sm text-red-400 hover:underline">Logout</a>
      </div>
      <ul id="users-list" class="space-y-1">
        {% for u in users %}
          <li class="flex items-center gap-2 p-2 rounded hover:bg-gray-800 cursor-pointer" data-uid="{{ u.id }}">
            <span class="w-2.5 h-2.5 rounded-full status {% if u.id in online_ids %}online{% else %}offline{% endif %}"></span>
            <img src="{{ u.avatar }}" class="w-6 h-6 rounded-full" alt="{{ u.username }}" />
            <span class="text-sm">{{ u.username }}</span>
          </li>
        {% endfor %}
      </ul>
    </aside>

    <!-- Chat area -->
    <main class="col-span-9 lg:col-span-10 flex flex-col">
      <header class="h-14 border-b border-gray-800 flex items-center px-4">
        <div class="text-sm text-gray-400" id="typing-bar" style="visibility:hidden;">Typing…</div>
      </header>

      <section id="chat-box" class="flex-1 overflow-y-auto p-4 space-y-2 bg-gray-900"></section>

      <form id="chat-form" class="h-16 border-t border-gray-800 flex items-center gap-2 px-4">
        <input id="chat-input" type="text" placeholder="Type a message…" autocomplete="off"
               class="flex-1 bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 outline-none focus:ring-2 focus:ring-blue-500" />
        <button type="submit" class="px-4 py-2 bg-blue-600 rounded-lg hover:bg-blue-500">Send</button>
      </form>
    </main>
  </div>

  <script>
    window.CURRENT_USER_ID = {{ current_user.id }};
  </script>
  <script src="/static/js/chat.js"></script>
</body>
</html>
