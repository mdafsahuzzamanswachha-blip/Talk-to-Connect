<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>TC Chat - Register</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Custom CSS (optional if you want overrides) -->
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body class="bg-gray-900 flex items-center justify-center h-screen font-inter">
  <div class="w-full max-w-md bg-gray-800 p-8 rounded-2xl shadow-lg">
    <h2 class="text-2xl font-bold text-center text-white mb-6">Create Your Account ✨</h2>

    {% if error %}
      <div class="mb-4 text-red-400 text-sm bg-red-900/30 px-3 py-2 rounded">
        {{ error }}
      </div>
    {% endif %}

    <form method="POST" action="/register" class="space-y-4">
      <!-- Name -->
      <div>
        <label class="block text-sm font-medium text-gray-300 mb-1">Name</label>
        <input 
          type="text" 
          name="username" 
          placeholder="Your name" 
          required 
          class="w-full px-4 py-2 rounded-lg bg-gray-700 text-gray-100 border border-gray-600 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
      </div>

      <!-- Email -->
      <div>
        <label class="block text-sm font-medium text-gray-300 mb-1">Email</label>
        <input 
          type="email" 
          name="email" 
          placeholder="you@gmail.com" 
          required 
          class="w-full px-4 py-2 rounded-lg bg-gray-700 text-gray-100 border border-gray-600 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
      </div>

      <!-- Password -->
      <div>
        <label class="block text-sm font-medium text-gray-300 mb-1">Password</label>
        <input 
          type="password" 
          name="password" 
          placeholder="Minimum 6 characters" 
          required 
          class="w-full px-4 py-2 rounded-lg bg-gray-700 text-gray-100 border border-gray-600 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
      </div>

      <!-- Submit -->
      <button 
        type="submit" 
        class="w-full py-2 bg-blue-600 hover:bg-blue-500 rounded-lg text-white font-semibold transition"
      >
        Sign up
      </button>
    </form>

    <!-- Footer -->
    <p class="text-center text-sm text-gray-400 mt-6">
      Already have an account? 
      <a href="/login" class="text-blue-400 hover:underline">Login</a>
    </p>
  </div>
</body>
</html>
